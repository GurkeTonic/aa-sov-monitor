name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          make_latest: true
          body: |
            Full changelog: [CHANGELOG.md](https://github.com/GurkeTonic/aa-sov-monitor/blob/main/CHANGELOG.md)
